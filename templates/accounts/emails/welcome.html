<html>
<body style="margin:0;padding:0;background:#f4f8ff;font-family:Arial,sans-serif;color:#0f1f36;">
    <div style="max-width:620px;margin:0 auto;padding:32px 20px;">
        <div style="background:#ffffff;border:1px solid rgba(15,31,54,0.08);border-radius:24px;padding:32px;box-shadow:0 20px 40px rgba(15,31,54,0.08);">
            <p style="margin:0 0 12px;color:#2563eb;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;">Compte actif</p>
            <h1 style="margin:0 0 16px;font-size:32px;line-height:1.05;">Bienvenue sur {{ platform_name }}</h1>
            <p style="margin:0 0 24px;color:#51627a;font-size:16px;line-height:1.7;">
                Bonjour {{ user.first_name|default:user.username }}, votre compte est desormais actif.
                Vous pouvez publier vos annonces, suivre vos demandes et piloter votre espace sereinement.
            </p>
            <p style="margin:0;">
                <a href="{{ dashboard_url }}" style="display:inline-block;padding:14px 22px;border-radius:999px;background:#2563eb;color:#ffffff;text-decoration:none;font-weight:700;">
                    Ouvrir mon espace
                </a>
            </p>
        </div>
    </div>
</body>
</html>

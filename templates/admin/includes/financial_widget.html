{% load static %}

<!-- Widget Finances pour le Dashboard Admin -->
<div class="admin-dashboard-widget" style="grid-column: span 2; background: white; border: 1px solid var(--border-color); border-radius: var(--r-xl); padding: var(--sp-6); box-shadow: var(--shadow-sm);">
    
    <div style="display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: var(--sp-4);">
        <div>
            <h3 style="margin: 0 0 var(--sp-1) 0; font-size: 1.2rem; font-weight: 700; color: var(--text);">💰 Gestion Financière</h3>
            <p style="color: var(--muted); font-size: var(--text-sm); margin: 0;">Suivi des entrées et sorties d'argent</p>
        </div>
        <a href="{% url 'financial_dashboard' %}" style="color: var(--gold-dark); text-decoration: none; font-weight: 600; font-size: var(--text-sm);">Voir tout →</a>
    </div>

    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: var(--sp-4); margin-bottom: var(--sp-6);">
        
        <a href="{% url 'financial_transaction_create' %}" class="widget-btn">
            <span style="font-size: 1.5rem; margin-bottom: 4px;">➕</span>
            <span style="font-weight: 600;">Nouvelle<br/>Transaction</span>
        </a>

        <a href="{% url 'financial_transactions_list' %}" class="widget-btn">
            <span style="font-size: 1.5rem; margin-bottom: 4px;">📋</span>
            <span style="font-weight: 600;">Voir Toutes<br/>les Transactions</span>
        </a>

        <a href="{% url 'financial_dashboard' %}" class="widget-btn">
            <span style="font-size: 1.5rem; margin-bottom: 4px;">📊</span>
            <span style="font-weight: 600;">Tableau de<br/>Bord</span>
        </a>

    </div>

</div>

<style>
    .widget-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: var(--sp-6);
        background: var(--bg-sand);
        border: 1px solid var(--border-color);
        border-radius: var(--r-lg);
        text-decoration: none;
        color: var(--text);
        font-size: var(--text-sm);
        text-align: center;
        transition: all 0.2s;
        cursor: pointer;
    }

    .widget-btn:hover {
        background: var(--gold-mist);
        border-color: var(--gold-dark);
        color: var(--gold-dark);
        transform: translateY(-2px);
        box-shadow: 0 4px 8px rgba(217, 119, 6, 0.15);
    }

    .widget-btn span:first-child {
        display: block;
        margin-bottom: var(--sp-2);
    }
</style>

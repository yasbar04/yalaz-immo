<!-- Signature pad — inclure avec le tag with pour passer client_sig_label -->
<div class="sig-grid">

    <!-- Signature client -->
    <div class="sig-block">
        <div class="sig-block-header">
            <p class="sig-label">{{ client_sig_label|default:"Client / Prospect" }}</p>
            <button type="button" class="sig-clear-btn" data-canvas="sig-canvas-client" data-hint="sig-hint-client">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                Effacer
            </button>
        </div>
        <div class="sig-canvas-wrap" id="sig-wrap-client">
            <canvas id="sig-canvas-client" class="sig-canvas"></canvas>
            <span class="sig-hint" id="sig-hint-client">Signez ici</span>
        </div>
        <input type="hidden" name="client_signature" id="sig-input-client">
    </div>

    <!-- Signature agent -->
    <div class="sig-block">
        <div class="sig-block-header">
            <p class="sig-label">Agent YALAZ</p>
            <button type="button" class="sig-clear-btn" data-canvas="sig-canvas-agent" data-hint="sig-hint-agent">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="11" height="11"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                Effacer
            </button>
        </div>
        <div class="sig-canvas-wrap" id="sig-wrap-agent">
            <canvas id="sig-canvas-agent" class="sig-canvas"></canvas>
            <span class="sig-hint" id="sig-hint-agent">Signez ici</span>
        </div>
        <input type="hidden" name="agent_signature" id="sig-input-agent">
    </div>

</div>

<style>
.sig-grid { display:grid; grid-template-columns:1fr 1fr; gap:1.25rem; }
.sig-block { display:flex; flex-direction:column; gap:.5rem; }
.sig-block-header { display:flex; align-items:center; justify-content:space-between; min-height:24px; }
.sig-label { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:var(--ink); margin:0; }
.sig-clear-btn {
    display:inline-flex; align-items:center; gap:.3rem;
    padding:.22rem .6rem;
    background:transparent; border:1px solid var(--border);
    border-radius:4px; font-size:.72rem; font-weight:600;
    color:var(--muted); cursor:pointer; transition:all .15s;
    font-family:inherit;
}
.sig-clear-btn:hover { border-color:#ef4444; color:#ef4444; background:rgba(239,68,68,.05); }
.sig-canvas-wrap {
    position:relative;
    border:1.5px dashed var(--border);
    border-radius:var(--r-md);
    background:#fafafa;
    height:140px;
    overflow:hidden;
    transition:border-color .2s, border-style .2s;
}
.sig-canvas-wrap.has-sig { border-style:solid; border-color:var(--gold); background:#fff; }
.sig-canvas {
    display:block;
    width:100%; height:100%;
    cursor:crosshair;
    touch-action:none;
    -webkit-user-select:none;
    user-select:none;
}
.sig-hint {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-size:.8rem; color:var(--muted);
    pointer-events:none;
    text-align:center;
    white-space:nowrap;
}
@media(max-width:640px) {
    .sig-grid { grid-template-columns:1fr; }
    .sig-canvas-wrap { height:160px; }
}
</style>

<script>
(function () {
    function setupCanvas(canvasId, hintId, inputId) {
        var canvas = document.getElementById(canvasId);
        var hint   = document.getElementById(hintId);
        var input  = document.getElementById(inputId);
        if (!canvas) return;

        var ctx     = canvas.getContext('2d');
        var drawing = false;
        var empty   = true;

        function resize() {
            var rect = canvas.getBoundingClientRect();
            var dpr  = window.devicePixelRatio || 1;
            var w    = rect.width  || 300;
            var h    = rect.height || 140;
            canvas.width  = Math.round(w * dpr);
            canvas.height = Math.round(h * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.strokeStyle = '#0a1628';
            ctx.lineWidth   = 2;
            ctx.lineCap     = 'round';
            ctx.lineJoin    = 'round';
        }

        function pos(e) {
            var r = canvas.getBoundingClientRect();
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        canvas.addEventListener('pointerdown', function (e) {
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);
            drawing = true;
            var p = pos(e);
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
            if (empty) {
                empty = false;
                hint.style.opacity = '0';
                canvas.parentElement.classList.add('has-sig');
            }
        });

        canvas.addEventListener('pointermove', function (e) {
            if (!drawing) return;
            e.preventDefault();
            var p = pos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(p.x, p.y);
        });

        function stopDraw() {
            if (!drawing) return;
            drawing = false;
            if (!empty) input.value = canvas.toDataURL('image/png');
        }
        canvas.addEventListener('pointerup',    stopDraw);
        canvas.addEventListener('pointercancel', stopDraw);

        canvas._clear = function () {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            empty = true;
            input.value = '';
            hint.style.opacity = '';
            canvas.parentElement.classList.remove('has-sig');
        };
        canvas._empty   = function () { return empty; };
        canvas._dataURL = function () { return empty ? '' : canvas.toDataURL('image/png'); };

        requestAnimationFrame(resize);
        window.addEventListener('resize', function () { resize(); });
    }

    function init() {
        setupCanvas('sig-canvas-client', 'sig-hint-client', 'sig-input-client');
        setupCanvas('sig-canvas-agent',  'sig-hint-agent',  'sig-input-agent');

        document.querySelectorAll('.sig-clear-btn').forEach(function (btn) {
            btn.addEventListener('click', function () {
                var c = document.getElementById(btn.dataset.canvas);
                if (c && c._clear) c._clear();
            });
        });

        var form = document.getElementById('sign-form') || document.getElementById('cf-form');
        if (form) {
            form.addEventListener('submit', function () {
                ['client', 'agent'].forEach(function (k) {
                    var c = document.getElementById('sig-canvas-' + k);
                    if (c && !c._empty())
                        document.getElementById('sig-input-' + k).value = c._dataURL();
                });
            });
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
    } else {
        init();
    }
}());
</script>

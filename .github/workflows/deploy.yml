name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/aylaz:latest
            ${{ secrets.DOCKER_USERNAME }}/aylaz:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aylaz:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/aylaz:buildcache,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/aylaz-app
            docker pull ${{ secrets.DOCKER_USERNAME }}/aylaz:latest
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            docker-compose -f docker-compose.prod.yml exec web python manage.py migrate
            docker-compose -f docker-compose.prod.yml exec web python manage.py collectstatic --noinput

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const conclusion = context.payload.workflow_run?.conclusion || context.job.status;
            const status = conclusion === 'success' ? '✅ Deployment Successful' : '❌ Deployment Failed';
            console.log(`${status} - Aylaz ${context.sha.substring(0, 7)}`);
